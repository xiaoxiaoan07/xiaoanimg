name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - LICENSE
      - .gitignore
      - .gitattributes
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - LICENSE
      - .gitignore
      - .gitattributes
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        include:
          - os: macos-latest
            platform: macos arm64
            build-command: ./gradlew createReleaseDistributable
            artifact-path: desktop/build/compose/binaries/main-release/app/payload-extract-gui
            artifact-name: payload-extract-gui-darwin-arm64-bin
            archive: true
          - os: ubuntu-latest
            platform: linux x64
            platformEx: android universal
            build-command: ./gradlew createReleaseDistributable
            build-commandEx: ./gradlew :android:assembleRelease
            artifact-path: desktop/build/compose/binaries/main-release/app/payload-extract-gui
            artifact-pathEx: android/build/outputs/apk/release/*.apk
            artifact-name: payload-extract-gui-linux-x64-bin
            artifact-nameEx: payload-extract-gui-android-universal-apk.apk
            archive: true
          - os: windows-latest
            platform: windows x64
            build-command: ./gradlew createReleaseDistributable
            artifact-path: desktop/build/compose/binaries/main-release/app/payload-extract-gui
            artifact-name: payload-extract-gui-windows-x64-exe
            archive: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platformEx == 'android universal' && 'aarch64-linux-android,x86_64-linux-android' || '' }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: ${{ matrix.os }}-cargo-

      - uses: gradle/actions/setup-gradle@v6

      - name: Decode android signing key
        if: matrix.platformEx == 'android universal'
        run: echo ${{ secrets.SIGNING_KEY }} | base64 -d > keystore.jks

      - name: Build ${{ matrix.platform }}
        run: ${{ matrix.build-command }}

      - name: Build ${{ matrix.platformEx }}
        if: matrix.platformEx == 'android universal'
        run: ${{ matrix.build-commandEx }}
        env:
          KEYSTORE_PATH: "../keystore.jks"
          KEYSTORE_PASS: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename ${{ matrix.platform }} artifact
        run: mv ${{ matrix.artifact-path }} ${{ matrix.artifact-name }}
        shell: bash

      - name: Rename ${{ matrix.platformEx }} artifact
        if: matrix.platformEx == 'android universal'
        run: mv ${{ matrix.artifact-pathEx }} ${{ matrix.artifact-nameEx }}
        shell: bash

      - name: Upload ${{ matrix.platform }} artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-name }}
          archive: ${{ matrix.archive }}

      - name: Upload ${{ matrix.platformEx }} artifact
        if: matrix.platformEx == 'android universal'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-nameEx }}
          path: ${{ matrix.artifact-nameEx }}
          archive: false
