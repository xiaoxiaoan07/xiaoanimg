name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - LICENSE
      - .gitignore
      - .gitattributes
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - LICENSE
      - .gitignore
      - .gitattributes
  workflow_dispatch:

jobs:
  desktop:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos arm64
            build-command: ./gradlew packageReleaseDmg
            artifact-path: desktop/build/compose/binaries/main-release/dmg/payload-extract-gui-1.0.0.dmg
            artifact-name: payload-extract-gui-darwin-arm64.dmg
            archive: false
          - os: ubuntu-latest
            platform: linux x64
            build-command: ./gradlew createReleaseDistributable
            artifact-path: desktop/build/compose/binaries/main-release/app/payload-extract-gui
            artifact-name: payload-extract-gui-linux-x64-bin
            archive: true
          - os: windows-latest
            platform: windows x64
            build-command: ./gradlew createReleaseDistributable
            artifact-path: desktop/build/compose/binaries/main-release/app/payload-extract-gui
            artifact-name: payload-extract-gui-windows-x64-exe
            archive: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: ${{ matrix.os }}-cargo-

      - uses: gradle/actions/setup-gradle@v6

      - name: Build ${{ matrix.platform }}
        run: ${{ matrix.build-command }}

      - name: Rename ${{ matrix.platform }} artifact
        run: mv ${{ matrix.artifact-path }} ${{ matrix.artifact-name }}
        shell: bash

      - name: Upload ${{ matrix.platform }} artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-name }}
          archive: ${{ matrix.archive }}

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
          key: android-cargo-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: android-cargo-

      - uses: gradle/actions/setup-gradle@v6

      - name: Decode android signing key
        run: echo ${{ secrets.SIGNING_KEY }} | base64 -d > keystore.jks

      - name: Build android
        run: ./gradlew :android:assembleRelease
        env:
          KEYSTORE_PATH: "../keystore.jks"
          KEYSTORE_PASS: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename android artifacts
        run: |
          mv android/build/outputs/apk/release/android-arm64-v8a-release.apk payload-extract-gui-android-arm64-v8a.apk
          mv android/build/outputs/apk/release/android-x86_64-release.apk payload-extract-gui-android-x86_64.apk

      - name: Upload android arm64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: payload-extract-gui-android-arm64-v8a.apk
          path: payload-extract-gui-android-arm64-v8a.apk
          archive: false

      - name: Upload android x86_64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: payload-extract-gui-android-x86_64.apk
          path: payload-extract-gui-android-x86_64.apk
          archive: false

  post_telegram:
    needs: [desktop, android]
    runs-on: ubuntu-latest
    if: ${{ success() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && github.ref_type != 'tag' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Post to Telegram
        env:
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_API_LINK: ${{ secrets.BOT_API_LINK }}
        run: bash .github/scripts/post_telegram.sh
